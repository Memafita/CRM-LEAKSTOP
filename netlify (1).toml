# Triagem Técnica IA — config Netlify (functions + segurança)
[build]
  publish = "."
  functions = "netlify/functions"
[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; manifest-src 'self' data: blob:; connect-src 'self' https://wa.me; font-src 'self' data:; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"
